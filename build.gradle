// Build file for CobbleBosses

plugins {
    id 'java'
}

group 'com.example'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // Define your dependencies here
}

jar {
    manifest {
        attributes(
